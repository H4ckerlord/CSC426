<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureLogin — CSC426</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="noise"></div>

  <main class="container">
    <!-- Left panel: branding -->
    <section class="brand-panel">
      <div class="brand-inner">
        <div class="logo-mark">
          <span class="logo-bracket">[</span>
          <span class="logo-text">SEC</span>
          <span class="logo-bracket">]</span>
        </div>
        <h1 class="brand-title">Secure<br/>Auth<br/>Portal</h1>
        <p class="brand-sub">CSC426 — Web Application Development<br/>Authentication System Project</p>
        <div class="demo-creds">
          <p class="creds-label">Demo Credentials</p>
          <div class="cred-row"><span class="cred-key">user</span><span class="cred-val">admin</span></div>
          <div class="cred-row"><span class="cred-key">pass</span><span class="cred-val">Admin@1234</span></div>
        </div>
        <div class="brand-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <!-- Right panel: login form -->
    <section class="form-panel">
      <div class="form-card">
        <div class="form-header">
          <h2>Sign In</h2>
          <p>Enter your credentials to continue</p>
        </div>

        <!-- Alert banner -->
        <div class="alert" id="alert" role="alert" aria-live="polite">
          <span class="alert-icon" id="alertIcon"></span>
          <span class="alert-msg" id="alertMsg"></span>
        </div>

        <div class="form-body" id="loginForm">
          <!-- Username -->
          <div class="field-group" id="fieldUsername">
            <label for="username">Username</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter username"
                autocomplete="username"
                maxlength="30"
                aria-describedby="usernameError"
              />
            </div>
            <span class="field-error" id="usernameError" role="alert"></span>
          </div>

          <!-- Password -->
          <div class="field-group" id="fieldPassword">
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                autocomplete="current-password"
                maxlength="64"
                aria-describedby="passwordError"
              />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeClosed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="passwordError" role="alert"></span>
          </div>

          <!-- Buttons -->
          <div class="btn-group">
            <button class="btn-login" id="btnLogin" type="button">
              <span class="btn-text">Login</span>
              <span class="btn-loader" id="btnLoader"></span>
            </button>
            <button class="btn-reset" id="btnReset" type="button">Reset</button>
          </div>
        </div>

        <!-- Success state -->
        <div class="success-state" id="successState">
          <div class="success-icon">✓</div>
          <h3 id="successName">Welcome!</h3>
          <p>You have successfully authenticated.</p>
          <button class="btn-logout" id="btnLogout" type="button">Sign Out</button>
        </div>

        <p class="form-footer">CSC426 Project &mdash; Web Authentication Demo</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
